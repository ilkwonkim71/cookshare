name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# git 훅(husky)은 CI 설치 단계에서 불필요
env:
  HUSKY: '0'

jobs:
  check:
    name: Lint · Typecheck · Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # packageManager 필드(pnpm@9.15.4) 사용

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit & integration tests (coverage)
        run: pnpm test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/lcov.info'
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    # E2E 는 실제 백엔드(pg)를 기동하므로 진짜 Postgres 가 필요하다.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cookshare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cookshare"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        # playwright.config 의 webServer 는 DB env 를 주입하지 않고
        # process.env 를 그대로 백엔드로 전달한다. 여기서 CI Postgres 를 가리킨다.
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/cookshare
          DATABASE_SSL: 'false'
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
