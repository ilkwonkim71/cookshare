name: '✨ 기능 제안 (Feature Request)'
description: 'MVP 명세에 없는 새로운 기능/개선 제안'
title: '[Feature] '
labels: ['type: feature']
body:
  - type: markdown
    attributes:
      value: |
        이미 `docs/MVP-SPEC.md`에 정의된 기능이라면 **사용자 스토리** 템플릿을 사용하세요. 이 템플릿은 명세 범위 밖의 신규 아이디어/개선용입니다.
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: '어떤 불편/필요에서 출발했나요?'
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 고려사항
      description: '아키텍처 영향(ARCHITECTURE.md), 스토리지/DB 전환 여지 등'
  - type: dropdown
    id: priority
    attributes:
      label: 제안 우선순위
      options:
        - 'P0 - Must-have'
        - 'P1 - Should-have'
        - 'P2 - Nice-to-have'
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: MVP 범위
      options:
        - label: 'MVP(3개월) 범위에 포함되어야 한다고 생각합니다'
