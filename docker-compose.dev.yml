# 개발용 Docker Compose — 핫 리로드 / Postgres 연동 / 볼륨 / 네트워크
# 실행:  docker compose -f docker-compose.dev.yml up --build
# 종료:  docker compose -f docker-compose.dev.yml down        (데이터 유지)
#        docker compose -f docker-compose.dev.yml down -v     (볼륨까지 삭제)

x-build: &build
  build:
    context: .
    dockerfile: Dockerfile.dev

x-source-mounts: &source-mounts
  - .:/app
  - /app/node_modules
  - /app/backend/node_modules
  - /app/frontend/node_modules
  - /app/packages/shared/node_modules

x-watch-env: &watch-env
  CHOKIDAR_USEPOLLING: 'true'
  WATCHPACK_POLLING: 'true'

services:
  # Postgres 데이터베이스 (Supabase 대신 로컬 개발용)
  postgres:
    image: postgres:16-alpine
    container_name: cookshare-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cookshare
    ports:
      - '5432:5432'
    volumes:
      - cookshare-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cookshare']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [cookshare-net]

  shared:
    <<: *build
    container_name: cookshare-shared
    command: pnpm --filter @cookshare/shared run dev
    environment:
      <<: *watch-env
    volumes: *source-mounts
    networks: [cookshare-net]

  backend:
    <<: *build
    container_name: cookshare-backend
    command: pnpm --filter @cookshare/backend run dev
    depends_on:
      postgres:
        condition: service_healthy
      shared:
        condition: service_started
    environment:
      <<: *watch-env
      NODE_ENV: development
      PORT: '4000'
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cookshare
      DATABASE_SSL: 'false'
      STORAGE_DRIVER: local
      UPLOAD_DIR: ./uploads
      PUBLIC_BASE_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backend/node_modules
      - /app/frontend/node_modules
      - /app/packages/shared/node_modules
      - cookshare-uploads:/app/backend/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [cookshare-net]

  frontend:
    <<: *build
    container_name: cookshare-frontend
    command: pnpm --filter @cookshare/frontend exec next dev -p 3000 -H 0.0.0.0
    depends_on:
      - backend
      - shared
    environment:
      <<: *watch-env
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - '3000:3000'
    volumes: *source-mounts
    networks: [cookshare-net]

networks:
  cookshare-net:
    driver: bridge
    name: cookshare-net

volumes:
  cookshare-pgdata:
    name: cookshare-pgdata
  cookshare-uploads:
    name: cookshare-uploads
