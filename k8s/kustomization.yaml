apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 한 번에 적용: kubectl apply -k k8s/
# (ingress.yaml 은 선택 사항이라 의도적으로 제외 — 필요 시 개별 적용)
namespace: cookshare

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - postgres.yaml
  - backend.yaml
  - frontend.yaml
