apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: cookshare
  labels:
    app.kubernetes.io/part-of: cookshare
    app.kubernetes.io/component: backend
data:
  PORT: '4000'
  JWT_EXPIRES_IN: '7d'
  DATABASE_PATH: './data/cookshare.sqlite'
  STORAGE_DRIVER: 'local'
  UPLOAD_DIR: './uploads'
  PUBLIC_BASE_URL: 'http://localhost:4000'
  # 브라우저(포트포워드)에서 접근하는 프론트 오리진
  CORS_ORIGIN: 'http://localhost:3000'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: cookshare
  labels:
    app.kubernetes.io/part-of: cookshare
    app.kubernetes.io/component: frontend
data:
  # NEXT_PUBLIC_* 는 브라우저 번들에 들어가므로 클러스터 내부 주소가 아닌
  # 호스트에서 접근 가능한 주소여야 한다.
  #  - 포트포워드 사용 시(기본): http://localhost:4000/api
  #  - Ingress 사용 시        : http://cookshare.local/api 로 변경
  NEXT_PUBLIC_API_URL: 'http://localhost:4000/api'
